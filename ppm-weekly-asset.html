<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light" />
  <title>PPM Weekly Asset View – ALS Engineering Dashboard</title>
  <style>
    :root {
      --bg:#f3f5f9;
      --paper:#ffffff;
      --ink:#0b0f1a;
      --muted:#6b7280;
      --border:#d9e1ee;
      --brand:#0b67c2;
      --brand-strong:#0a5cb0;
      --als-blue:var(--brand);
      --grid:var(--border);
      --shadow:0 1px 2px rgba(16,24,40,.06),0 4px 10px rgba(16,24,40,.06);
      --sticky-controls-offset:0px;
      --ui-offset:0px;
      --planner-columns:260px minmax(0,1fr) minmax(0,1fr) minmax(0,1fr);
      --planner-min-width:960px;
      --card-red:#fde8e8;
      --card-green:#e7f8ee;
      --card-orange:#fff0dd;
      --card-blue:#e7f2ff;
    }

    .dark {
      color-scheme:dark;
      --bg:#0f1422;
      --paper:#131a2b;
      --ink:#f3f4f6;
      --muted:#9ca3af;
      --border:#2a3656;
      --brand:#3b82f6;
      --brand-strong:#2563eb;
      --als-blue:var(--brand);
      --grid:#2a3656;
      --card-red:#4a2222;
      --card-green:#1c3f2f;
      --card-orange:#4d351c;
      --card-blue:#1f3557;
    }

    body {
      margin:0;
      background:var(--bg);
      color:var(--ink);
      font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      font-size:13px;
      line-height:1.4;
    }

    body::before {
      content:"";
      position:fixed;
      inset:0 0 auto 0;
      height:var(--ui-offset, var(--sticky-controls-offset, 0px));
      background:var(--bg);
      pointer-events:none;
      z-index:180;
    }

    .page {
      --page-pad-top:12px;
      --page-pad-inline:clamp(20px,4vw,36px);
      --page-pad-bottom:48px;
      padding:var(--page-pad-top) var(--page-pad-inline) var(--page-pad-bottom);
      max-width:clamp(960px,96vw,1680px);
      margin-inline:auto;
      box-sizing:border-box;
    }

    .page-head { display:flex; align-items:center; justify-content:space-between; gap:16px; padding-bottom:12px; }
    .page-head__title { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
    .title { margin:0; font-size:24px; font-weight:800; }
    .logo { height:50px; margin-left:auto; }

    .nav { display:flex; gap:6px; flex-wrap:wrap; margin:4px 0 0; }
    .nav .tab {
      padding:7px 12px;
      border-radius:999px;
      border:1px solid var(--grid);
      background:transparent;
      color:var(--ink);
      font-weight:700;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      transition:box-shadow .15s ease,border-color .15s ease,background .15s ease;
    }
    .nav .tab[aria-selected="true"], .nav .tab:focus-visible {
      outline:none;
      border-color:var(--als-blue);
      background:color-mix(in srgb,var(--als-blue) 8%,var(--paper));
      box-shadow:0 0 0 2px color-mix(in srgb,var(--als-blue) 30%,transparent);
    }

    .sticky-top { position:sticky; top:0; z-index:220; }
    .sticky-controls {
      display:flex;
      align-items:center;
      flex-wrap:wrap;
      gap:10px;
      padding:10px 0 12px;
      background:var(--bg);
      border-bottom:1px solid color-mix(in srgb,var(--grid) 60%,transparent);
      margin-bottom:16px;
    }

    .ctrl-pill {
      display:inline-flex;
      align-items:center;
      gap:.5rem;
      height:36px;
      padding:0 .75rem;
      border-radius:9999px;
      border:1px solid var(--grid);
      background:var(--paper);
      color:var(--ink);
      box-shadow:0 1px 2px rgba(0,0,0,.05);
      font:inherit;
      font-weight:600;
      cursor:pointer;
    }

    .site-filter { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
    .site-filter__label { font-weight:600; color:var(--muted); }
    .site-filter__tabs { display:flex; gap:6px; flex-wrap:wrap; }
    .site-filter__tab {
      border:1px solid var(--grid);
      background:var(--paper);
      color:var(--ink);
      border-radius:9999px;
      padding:6px 10px;
      font-weight:600;
      cursor:pointer;
    }
    .site-filter__tab[aria-pressed="true"] { border-color:var(--als-blue); background:color-mix(in srgb,var(--als-blue) 12%,var(--paper)); }

    .kpi-row { display:grid; grid-template-columns:repeat(3,minmax(180px,1fr)); gap:12px; margin:0 0 20px; }
    .kpi-card {
      background:var(--paper);
      border:1px solid var(--grid);
      border-radius:12px;
      padding:12px 14px;
      box-shadow:var(--shadow);
    }
    .kpi-card__label { color:var(--muted); font-size:12px; font-weight:600; }
    .kpi-card__value { margin-top:4px; font-size:24px; font-weight:800; }

    .planner {
      border:1px solid var(--grid);
      border-radius:14px;
      background:var(--paper);
      box-shadow:var(--shadow);
      overflow:auto;
    }
    .planner__surface {
      min-width:var(--planner-min-width);
    }
    .planner-header,
    .planner-row {
      display:grid;
      grid-template-columns:var(--planner-columns);
      align-items:stretch;
    }

    .planner-header {
      position:sticky;
      top:0;
      z-index:4;
      background:var(--paper);
      border-bottom:1px solid var(--grid);
    }

    .planner-cell {
      border-right:1px solid var(--grid);
      border-bottom:1px solid var(--grid);
      padding:12px;
      box-sizing:border-box;
      min-width:0;
      overflow:hidden;
    }
    .planner-cell:last-child { border-right:none; }

    .planner-header .planner-cell {
      font-weight:800;
      font-size:14px;
      min-height:52px;
      display:flex;
      align-items:center;
    }

    .planner-row .planner-cell {
      min-height:116px;
      vertical-align:top;
    }

    .asset-cell {
      background:color-mix(in srgb,var(--brand) 4%,var(--paper));
      font-weight:800;
      display:flex;
      align-items:flex-start;
      justify-content:flex-start;
      word-break:break-word;
      overflow-wrap:anywhere;
    }

    .week-cell {
      display:flex;
      flex-direction:column;
      align-items:stretch;
      justify-content:flex-start;
      gap:8px;
    }

    .wo-card {
      border:1px solid color-mix(in srgb,var(--als-blue) 28%,var(--grid));
      border-radius:10px;
      padding:8px 9px;
      background:var(--card-blue);
      overflow:hidden;
    }
    .wo-card--red { background:var(--card-red); }
    .wo-card--green { background:var(--card-green); }
    .wo-card--orange { background:var(--card-orange); }
    .wo-card--blue { background:var(--card-blue); }

    .wo-card__id { font-size:12px; font-weight:800; color:var(--muted); }
    .wo-card__title {
      font-size:13px;
      font-weight:700;
      margin-top:2px;
      white-space:normal;
      word-break:break-word;
      overflow-wrap:anywhere;
    }
    .wo-card__meta {
      font-size:12px;
      color:var(--muted);
      margin-top:4px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .empty-state {
      margin:0;
      padding:16px;
      color:var(--muted);
      font-weight:600;
      border-top:1px solid var(--grid);
      background:color-mix(in srgb,var(--brand) 2%,var(--paper));
    }

    .planner-row:last-child .planner-cell { border-bottom:none; }

    @media (max-width: 820px){
      .kpi-row{grid-template-columns:1fr;}
      .logo{display:none;}
      .planner { border-radius:10px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="page-head">
      <div class="page-head__title">
        <h1 class="title">PPM Weekly Asset View</h1>
        <nav class="nav" aria-label="Dashboard sections">
          <a class="tab" href="index.html">Work Orders</a>
          <a class="tab" href="facilities.html">Facilities</a>
          <a class="tab" href="pssr.html">PSSR Inspections</a>
          <a class="tab" href="inspections.html">Inspections Tracker</a>
          <a class="tab" aria-selected="true" href="ppm-weekly-asset.html">PPM Weekly Asset View</a>
        </nav>
      </div>
      <img class="logo" src="LOGOlesswhitespace.png" alt="ALS logo" />
    </header>

    <section class="sticky-top" data-component="sticky-controls">
      <div class="sticky-controls">
        <button class="ctrl-pill" id="dark-toggle" type="button" role="switch" aria-checked="false" aria-label="Toggle dark theme">Theme: Light</button>
        <div class="site-filter" data-role="site-filter">
          <span class="site-filter__label">Site: <span data-role="site-filter-active">All</span></span>
          <div class="site-filter__tabs" role="group" aria-label="Filter by site">
            <button type="button" class="site-filter__tab" data-site-key="all" aria-pressed="true">All</button>
            <button type="button" class="site-filter__tab" data-site-key="East Kilbride" aria-pressed="false">East Kilbride</button>
            <button type="button" class="site-filter__tab" data-site-key="Mugiemoss" aria-pressed="false">Mugiemoss</button>
            <button type="button" class="site-filter__tab" data-site-key="Keith" aria-pressed="false">Keith</button>
            <button type="button" class="site-filter__tab" data-site-key="Byron" aria-pressed="false">Byron</button>
          </div>
        </div>
      </div>
    </section>

    <section class="kpi-row" aria-label="PPM summary KPIs">
      <article class="kpi-card">
        <div class="kpi-card__label">Active PPM Work Orders</div>
        <div class="kpi-card__value" data-kpi="total-work-orders">0</div>
      </article>
      <article class="kpi-card">
        <div class="kpi-card__label">Assets with Active PPMs</div>
        <div class="kpi-card__value" data-kpi="total-assets">0</div>
      </article>
      <article class="kpi-card">
        <div class="kpi-card__label">WOs Due This Week</div>
        <div class="kpi-card__value" data-kpi="week1-work-orders">0</div>
      </article>
    </section>

    <section class="planner" aria-label="Weekly PPM planning matrix">
      <div class="planner__surface" data-role="planner-surface"></div>
    </section>
  </div>

  <script src="ppm-weekly-asset-transform.js"></script>
  <script>
    (function(){
      const plannerSurface = document.querySelector('[data-role="planner-surface"]');
      const siteLabel = document.querySelector('[data-role="site-filter-active"]');
      const siteFilterTabs = document.querySelector('.site-filter__tabs');
      const themeBtn = document.getElementById('dark-toggle');
      const root = document.body;

      let selectedSiteKey = 'all';
      const MAINTAINX_SOURCE_CONFIG = Object.freeze({
        ...window.PPMWeeklyAssetTransform.MAINTAINX_SOURCE_CONFIG,
        sourceMode: 'selected_week'
      });

      let plannerData = null;
      let plannerError = null;

      function startOfWeek(date){
        const d = new Date(date);
        const day = d.getDay();
        const mondayOffset = (day + 6) % 7;
        d.setDate(d.getDate() - mondayOffset);
        d.setHours(0, 0, 0, 0);
        return d;
      }

      function cardStatusClass(status){
        const normalized = String(status || '').toLowerCase();
        if(normalized.includes('complete') || normalized.includes('done')) return 'wo-card--green';
        if(normalized.includes('hold')) return 'wo-card--orange';
        if(normalized.includes('progress')) return 'wo-card--blue';
        return 'wo-card--red';
      }

      function formatDueMeta(wo){
        const date = wo.dueDate ? new Date(wo.dueDate) : new Date(wo.dueDateRaw);
        const dayLabel = Number.isNaN(date.getTime())
          ? 'Day n/a'
          : date.toLocaleDateString('en-GB', { weekday: 'short' });
        const site = wo.site || window.PPMWeeklyAssetTransform.SITE_KEY_LABELS[wo.siteKey] || 'Unknown site';
        return `Due ${dayLabel} • ${site}`;
      }

      function PPMPlannerHeader(){
        return `
          <div class="planner-header" role="row">
            <div class="planner-cell" role="columnheader">Asset</div>
            <div class="planner-cell" role="columnheader">Week 1</div>
            <div class="planner-cell" role="columnheader">Week 2</div>
            <div class="planner-cell" role="columnheader">Week 3</div>
          </div>
        `;
      }

      function renderWeekCards(weekOrders){
        if(!weekOrders.length){
          return '';
        }

        return weekOrders.map((wo) => {
          const safeTitle = wo.title && wo.title !== wo.woNumber ? `<div class="wo-card__title">${wo.title}</div>` : '';
          return `
            <article class="wo-card ${cardStatusClass(wo.status)}" aria-label="${wo.woNumber}">
              <div class="wo-card__id">${wo.woNumber}</div>
              ${safeTitle}
              <div class="wo-card__meta">${formatDueMeta(wo)}</div>
            </article>
          `;
        }).join('');
      }

      function PPMAssetRow(row){
        return `
          <div class="planner-row" role="row">
            <div class="planner-cell asset-cell" role="rowheader" title="${row.assetName}">${row.assetName}</div>
            <div class="planner-cell week-cell" role="gridcell">${renderWeekCards(row.weeks.week1)}</div>
            <div class="planner-cell week-cell" role="gridcell">${renderWeekCards(row.weeks.week2)}</div>
            <div class="planner-cell week-cell" role="gridcell">${renderWeekCards(row.weeks.week3)}</div>
          </div>
        `;
      }

      function renderSiteFilter(siteKeys){
        const keys = ['all', ...(siteKeys || [])];
        const labels = window.PPMWeeklyAssetTransform.SITE_KEY_LABELS;
        siteFilterTabs.innerHTML = keys.map(siteKey => {
          const text = labels[siteKey] || siteKey;
          const pressed = selectedSiteKey === siteKey ? 'true' : 'false';
          return `<button type="button" class="site-filter__tab" data-site-key="${siteKey}" aria-pressed="${pressed}">${text}</button>`;
        }).join('');

        siteFilterTabs.querySelectorAll('.site-filter__tab').forEach((button) => {
          button.addEventListener('click', () => {
            selectedSiteKey = button.dataset.siteKey || 'all';
            siteFilterTabs.querySelectorAll('.site-filter__tab')
              .forEach((tab) => tab.setAttribute('aria-pressed', tab === button ? 'true' : 'false'));
            if(siteLabel) siteLabel.textContent = labels[selectedSiteKey] || selectedSiteKey;
            renderPlanner();
          });
        });

        if(siteLabel){
          siteLabel.textContent = labels[selectedSiteKey] || selectedSiteKey;
        }
      }

      function renderError(message){
        plannerSurface.innerHTML = `${PPMPlannerHeader()}<p class="empty-state">${message}</p>`;
        document.querySelector('[data-kpi="total-work-orders"]').textContent = '0';
        document.querySelector('[data-kpi="total-assets"]').textContent = '0';
        document.querySelector('[data-kpi="week1-work-orders"]').textContent = '0';
      }

      function renderPlanner(){
        if(plannerError){
          renderError(plannerError);
          return;
        }

        if(!plannerData){
          renderError('Loading MaintainX work orders…');
          return;
        }

        const grouped = window.PPMWeeklyAssetTransform.groupPPMWorkOrdersByAssetAndWeek(
          plannerData.activePPM,
          selectedSiteKey,
          startOfWeek(new Date())
        );

        const totalWeek1 = grouped.rows.reduce((acc, row) => acc + row.weeks.week1.length, 0);
        document.querySelector('[data-kpi="total-work-orders"]').textContent = String(grouped.summary.totalWorkOrders);
        document.querySelector('[data-kpi="total-assets"]').textContent = String(grouped.summary.totalAssets);
        document.querySelector('[data-kpi="week1-work-orders"]').textContent = String(totalWeek1);

        const rowsMarkup = grouped.rows.map(PPMAssetRow).join('');
        const selectedWeekLabel = plannerData.sourceType === 'raw_work_orders'
          ? 'MX_Raw_WorkOrders'
          : (plannerData.selectedWeek?.label || plannerData.selectedWeek?.weekEnd || 'latest published week');
        const emptyMarkup = grouped.rows.length === 0
          ? `<p class="empty-state">No active PPM work orders found for the selected site and 3-week period (source: ${selectedWeekLabel}).</p>`
          : '';

        plannerSurface.innerHTML = `${PPMPlannerHeader()}${rowsMarkup}${emptyMarkup}`;
      }

      async function loadPlannerData(){
        try {
          const source = await window.PPMWeeklyAssetTransform.loadMaintainXRawData(MAINTAINX_SOURCE_CONFIG);
          const normalized = window.PPMWeeklyAssetTransform.getNormalizedWorkOrders(source.rawRows);
          const activePPM = window.PPMWeeklyAssetTransform.getActivePPMWorkOrders(normalized);

          plannerData = {
            sourceType: source.sourceType,
            sourceUrl: source.sourceUrl,
            selectedWeek: source.selectedWeek,
            activePPM
          };

          const initialGroup = window.PPMWeeklyAssetTransform.groupPPMWorkOrdersByAssetAndWeek(
            activePPM,
            'all',
            startOfWeek(new Date())
          );

          renderSiteFilter(initialGroup.sites);
          renderPlanner();
        } catch (err){
          console.error('[PPM Weekly Asset] Failed to load shared MaintainX source', err);
          plannerError = `MaintainX source unavailable. ${err?.message || 'Could not load shared work order data.'}`;
          renderSiteFilter([]);
          renderPlanner();
        }
      }

      function applyTheme(theme){
        const isDark = theme === 'dark';
        root.classList.toggle('dark', isDark);
        root.classList.toggle('light', !isDark);
        themeBtn?.setAttribute('aria-checked', isDark ? 'true' : 'false');
        themeBtn.textContent = isDark ? 'Theme: Dark' : 'Theme: Light';
      }

      function updateStickyOffset(){
        const sticky = document.querySelector('[data-component="sticky-controls"]');
        const rect = sticky?.getBoundingClientRect();
        document.documentElement.style.setProperty('--sticky-controls-offset', `${Math.ceil(rect ? rect.height : 0)}px`);
      }

      const THEME_KEY = 'theme';
      const stored = localStorage.getItem(THEME_KEY) || 'light';
      applyTheme(stored);
      themeBtn?.addEventListener('click', () => {
        const next = root.classList.contains('dark') ? 'light' : 'dark';
        localStorage.setItem(THEME_KEY, next);
        applyTheme(next);
      });

      renderSiteFilter([]);
      renderPlanner();
      loadPlannerData();
      updateStickyOffset();
      window.addEventListener('resize', updateStickyOffset, { passive:true });
    })();
  </script>
</body>
</html>
