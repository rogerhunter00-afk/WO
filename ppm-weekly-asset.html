<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light" />
  <title>PPM Weekly Asset View – ALS Engineering Dashboard</title>
  <style>
    :root {
      --bg:#f3f5f9;
      --paper:#ffffff;
      --ink:#0b0f1a;
      --muted:#6b7280;
      --border:#d9e1ee;
      --brand:#0b67c2;
      --brand-strong:#0a5cb0;
      --als-blue:var(--brand);
      --grid:var(--border);
      --shadow:0 1px 2px rgba(16,24,40,.06),0 4px 10px rgba(16,24,40,.06);
      --sticky-controls-offset:0px;
      --ui-offset:0px;
      --planner-columns:260px;
      --planner-min-width:1200px;
      --card-red:#fde8e8;
      --card-green:#e7f8ee;
      --card-orange:#fff0dd;
      --card-blue:#e7f2ff;
    }

    .dark {
      color-scheme:dark;
      --bg:#0f1422;
      --paper:#131a2b;
      --ink:#f3f4f6;
      --muted:#9ca3af;
      --border:#2a3656;
      --brand:#3b82f6;
      --brand-strong:#2563eb;
      --als-blue:var(--brand);
      --grid:#2a3656;
      --card-red:#4a2222;
      --card-green:#1c3f2f;
      --card-orange:#4d351c;
      --card-blue:#1f3557;
    }

    body {
      margin:0;
      background:var(--bg);
      color:var(--ink);
      font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      font-size:13px;
      line-height:1.4;
    }

    body::before {
      content:"";
      position:fixed;
      inset:0 0 auto 0;
      height:var(--ui-offset, var(--sticky-controls-offset, 0px));
      background:var(--bg);
      pointer-events:none;
      z-index:180;
    }

    .page {
      --page-pad-top:12px;
      --page-pad-inline:clamp(20px,4vw,36px);
      --page-pad-bottom:48px;
      padding:var(--page-pad-top) var(--page-pad-inline) var(--page-pad-bottom);
      max-width:clamp(960px,96vw,1680px);
      margin-inline:auto;
      box-sizing:border-box;
    }

    .page-head { display:flex; align-items:center; justify-content:space-between; gap:16px; padding-bottom:12px; }
    .page-head__title { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
    .title { margin:0; font-size:24px; font-weight:800; }
    .logo { height:50px; margin-left:auto; }

    .nav { display:flex; gap:6px; flex-wrap:wrap; margin:4px 0 0; }
    .nav .tab {
      padding:7px 12px;
      border-radius:999px;
      border:1px solid var(--grid);
      background:transparent;
      color:var(--ink);
      font-weight:700;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      transition:box-shadow .15s ease,border-color .15s ease,background .15s ease;
    }
    .nav .tab[aria-selected="true"], .nav .tab:focus-visible {
      outline:none;
      border-color:var(--als-blue);
      background:color-mix(in srgb,var(--als-blue) 8%,var(--paper));
      box-shadow:0 0 0 2px color-mix(in srgb,var(--als-blue) 30%,transparent);
    }

    .sticky-top { position:sticky; top:0; z-index:220; }
    .sticky-controls {
      display:flex;
      align-items:center;
      flex-wrap:wrap;
      gap:10px;
      padding:10px 0 12px;
      background:var(--bg);
      border-bottom:1px solid color-mix(in srgb,var(--grid) 60%,transparent);
      margin-bottom:16px;
    }
    .year-controls {
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
    }
    .year-controls__label {
      font-weight:600;
      color:var(--muted);
    }
    .year-controls select {
      border:1px solid var(--grid);
      background:var(--paper);
      color:var(--ink);
      border-radius:9999px;
      height:36px;
      padding:0 .75rem;
      font:inherit;
      font-weight:700;
    }
    .month-jump {
      display:flex;
      flex-wrap:wrap;
      gap:6px;
    }
    .month-jump__btn {
      border:1px solid var(--grid);
      background:var(--paper);
      color:var(--ink);
      border-radius:9999px;
      padding:4px 9px;
      font-size:12px;
      font-weight:700;
      cursor:pointer;
    }
    .month-jump__btn:hover { border-color:var(--als-blue); }
    .month-jump__btn:disabled { opacity:.45; cursor:not-allowed; }

    .ctrl-pill {
      display:inline-flex;
      align-items:center;
      gap:.5rem;
      height:36px;
      padding:0 .75rem;
      border-radius:9999px;
      border:1px solid var(--grid);
      background:var(--paper);
      color:var(--ink);
      box-shadow:0 1px 2px rgba(0,0,0,.05);
      font:inherit;
      font-weight:600;
      cursor:pointer;
    }

    .site-filter { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
    .site-filter__label { font-weight:600; color:var(--muted); }
    .site-filter__tabs { display:flex; gap:6px; flex-wrap:wrap; }
    .site-filter__tab {
      border:1px solid var(--grid);
      background:var(--paper);
      color:var(--ink);
      border-radius:9999px;
      padding:6px 10px;
      font-weight:600;
      cursor:pointer;
    }
    .site-filter__tab[aria-pressed="true"] { border-color:var(--als-blue); background:color-mix(in srgb,var(--als-blue) 12%,var(--paper)); }

    .kpi-row { display:grid; grid-template-columns:repeat(3,minmax(180px,1fr)); gap:12px; margin:0 0 20px; }
    .kpi-card {
      background:var(--paper);
      border:1px solid var(--grid);
      border-radius:12px;
      padding:12px 14px;
      box-shadow:var(--shadow);
    }
    .kpi-card__label { color:var(--muted); font-size:12px; font-weight:600; }
    .kpi-card__value { margin-top:4px; font-size:24px; font-weight:800; }

    .planner {
      border:1px solid var(--grid);
      border-radius:14px;
      background:var(--paper);
      box-shadow:var(--shadow);
      overflow:auto;
    }
    .planner__surface {
      min-width:var(--planner-min-width);
    }
    .planner-header,
    .planner-row {
      display:grid;
      grid-template-columns:var(--planner-columns);
      align-items:stretch;
    }

    .planner-header {
      position:sticky;
      top:0;
      z-index:4;
      background:var(--paper);
      border-bottom:1px solid var(--grid);
    }

    .planner-cell {
      border-right:1px solid var(--grid);
      border-bottom:1px solid var(--grid);
      padding:12px;
      box-sizing:border-box;
      min-width:0;
      overflow:hidden;
    }
    .planner-cell:last-child { border-right:none; }

    .planner-header .planner-cell {
      font-weight:800;
      font-size:12px;
      min-height:52px;
      display:flex;
      align-items:center;
    }
    .planner-header .planner-cell:first-child {
      position:sticky;
      left:0;
      z-index:5;
      background:var(--paper);
      box-shadow:2px 0 0 0 var(--grid);
    }

    .planner-row .planner-cell {
      min-height:116px;
      vertical-align:top;
    }

    .asset-cell {
      background:color-mix(in srgb,var(--brand) 4%,var(--paper));
      font-weight:800;
      display:flex;
      align-items:flex-start;
      justify-content:flex-start;
      word-break:break-word;
      overflow-wrap:anywhere;
      position:sticky;
      left:0;
      z-index:3;
      box-shadow:2px 0 0 0 var(--grid);
    }

    .week-cell {
      display:flex;
      flex-direction:column;
      align-items:stretch;
      justify-content:flex-start;
      gap:4px;
    }

    .wo-card {
      border:1px solid color-mix(in srgb,var(--als-blue) 28%,var(--grid));
      border-radius:7px;
      padding:4px 6px;
      background:var(--card-blue);
      overflow:hidden;
    }
    .wo-card--red { background:var(--card-red); }
    .wo-card--green { background:var(--card-green); }
    .wo-card--orange { background:var(--card-orange); }
    .wo-card--blue { background:var(--card-blue); }

    .wo-card__id { font-size:11px; font-weight:800; color:var(--muted); line-height:1.2; }
    .wo-card__title {
      font-size:11px;
      font-weight:700;
      margin-top:1px;
      white-space:normal;
      word-break:break-word;
      overflow-wrap:anywhere;
      line-height:1.2;
    }
    .wo-card__meta {
      font-size:10px;
      color:var(--muted);
      margin-top:2px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .empty-state {
      margin:0;
      padding:16px;
      color:var(--muted);
      font-weight:600;
      border-top:1px solid var(--grid);
      background:color-mix(in srgb,var(--brand) 2%,var(--paper));
    }

    .planner-row:last-child .planner-cell { border-bottom:none; }

    @media (max-width: 820px){
      .kpi-row{grid-template-columns:1fr;}
      .logo{display:none;}
      .planner { border-radius:10px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="page-head">
      <div class="page-head__title">
        <h1 class="title">PPM Weekly Asset View</h1>
        <nav class="nav" aria-label="Dashboard sections">
          <a class="tab" href="index.html">Work Orders</a>
          <a class="tab" href="facilities.html">Facilities</a>
          <a class="tab" href="pssr.html">PSSR Inspections</a>
          <a class="tab" href="inspections.html">Inspections Tracker</a>
          <a class="tab" aria-selected="true" href="ppm-weekly-asset.html">PPM Weekly Asset View</a>
        </nav>
      </div>
      <img class="logo" src="LOGOlesswhitespace.png" alt="ALS logo" />
    </header>

    <section class="sticky-top" data-component="sticky-controls">
      <div class="sticky-controls">
        <button class="ctrl-pill" id="dark-toggle" type="button" role="switch" aria-checked="false" aria-label="Toggle dark theme">Theme: Light</button>
        <div class="year-controls" aria-label="Select planning year">
          <label class="year-controls__label" for="year-select">Year</label>
          <select id="year-select"></select>
        </div>
        <div class="month-jump" data-role="month-jump" aria-label="Jump to month"></div>
        <div class="site-filter" data-role="site-filter">
          <span class="site-filter__label">Site: <span data-role="site-filter-active">All</span></span>
          <div class="site-filter__tabs" role="group" aria-label="Filter by site">
            <button type="button" class="site-filter__tab" data-site-key="all" aria-pressed="true">All</button>
            <button type="button" class="site-filter__tab" data-site-key="East Kilbride" aria-pressed="false">East Kilbride</button>
            <button type="button" class="site-filter__tab" data-site-key="Mugiemoss" aria-pressed="false">Mugiemoss</button>
            <button type="button" class="site-filter__tab" data-site-key="Keith" aria-pressed="false">Keith</button>
            <button type="button" class="site-filter__tab" data-site-key="Byron" aria-pressed="false">Byron</button>
          </div>
        </div>
      </div>
    </section>

    <section class="kpi-row" aria-label="PPM summary KPIs">
      <article class="kpi-card">
        <div class="kpi-card__label">WOs Due in Selected Year</div>
        <div class="kpi-card__value" data-kpi="total-work-orders">0</div>
      </article>
      <article class="kpi-card">
        <div class="kpi-card__label">Active PPM Assets</div>
        <div class="kpi-card__value" data-kpi="total-assets">0</div>
      </article>
      <article class="kpi-card">
        <div class="kpi-card__label">Weeks with Scheduled PPMs</div>
        <div class="kpi-card__value" data-kpi="scheduled-weeks">0</div>
      </article>
    </section>

    <section class="planner" aria-label="Weekly PPM planning matrix">
      <div class="planner__surface" data-role="planner-surface"></div>
    </section>
  </div>

  <script src="ppm-weekly-asset-transform.js"></script>
  <script>
    (function(){
      const plannerSurface = document.querySelector('[data-role="planner-surface"]');
      const siteLabel = document.querySelector('[data-role="site-filter-active"]');
      const siteFilterTabs = document.querySelector('.site-filter__tabs');
      const yearSelect = document.getElementById('year-select');
      const monthJump = document.querySelector('[data-role="month-jump"]');
      const themeBtn = document.getElementById('dark-toggle');
      const root = document.body;

      let selectedSiteKey = 'all';
      let selectedYear = new Date().getFullYear();
      let plannerData = null;
      let plannerError = null;
      let weekKeyOrder = [];

      function startOfWeek(date){
        const d = new Date(date);
        const day = d.getDay();
        const mondayOffset = (day + 6) % 7;
        d.setDate(d.getDate() - mondayOffset);
        d.setHours(0, 0, 0, 0);
        return d;
      }

      function isoWeekKey(date){
        const d = startOfWeek(date);
        const year = d.getFullYear();
        const jan4 = new Date(year, 0, 4);
        const week1Start = startOfWeek(jan4);
        const weekNo = Math.floor((d.getTime() - week1Start.getTime()) / (7 * 24 * 60 * 60 * 1000)) + 1;
        return `${year}-W${String(weekNo).padStart(2, '0')}`;
      }

      function listYearWeekKeys(year){
        const keys = [];
        let cursor = startOfWeek(new Date(year, 0, 4));
        while(cursor.getFullYear() <= year){
          if(cursor.getFullYear() === year){
            keys.push(isoWeekKey(cursor));
          }
          cursor = new Date(cursor.getTime() + (7 * 24 * 60 * 60 * 1000));
          if(keys.length > 54) break;
        }
        return [...new Set(keys)];
      }

      function buildMonthMap(weekKeys){
        const map = new Map();
        weekKeys.forEach((weekKey) => {
          const weekNo = Number(weekKey.split('-W')[1]);
          const jan4 = new Date(selectedYear, 0, 4);
          const week1Start = startOfWeek(jan4);
          const weekStart = new Date(week1Start.getTime() + ((weekNo - 1) * 7 * 24 * 60 * 60 * 1000));
          const m = weekStart.getMonth();
          if(!map.has(m)) map.set(m, weekKey);
        });
        return map;
      }

      function cardStatusClass(status){
        const normalized = String(status || '').toLowerCase();
        if(normalized.includes('complete') || normalized.includes('done')) return 'wo-card--green';
        if(normalized.includes('hold')) return 'wo-card--orange';
        if(normalized.includes('progress')) return 'wo-card--blue';
        return 'wo-card--red';
      }

      function formatDueMeta(wo){
        const date = wo.dueDate ? new Date(wo.dueDate) : new Date(wo.dueDateRaw);
        const dayLabel = Number.isNaN(date.getTime())
          ? 'Day n/a'
          : date.toLocaleDateString('en-GB', { weekday: 'short' });
        const site = wo.site || window.PPMWeeklyAssetTransform.SITE_KEY_LABELS[wo.siteKey] || 'Unknown site';
        return `Due ${dayLabel} • ${site}`;
      }

      function PPMPlannerHeader(weekKeys){
        const weekColumns = weekKeys.map((weekKey) => `<div class="planner-cell" role="columnheader">${weekKey.replace('-', ' ')}</div>`).join('');
        return `
          <div class="planner-header" role="row">
            <div class="planner-cell" role="columnheader">Asset</div>
            ${weekColumns}
          </div>
        `;
      }

      function renderWeekCards(weekOrders){
        if(!weekOrders.length){
          return '';
        }

        return weekOrders.map((wo) => {
          const safeTitle = wo.title && wo.title !== wo.woNumber ? `<div class="wo-card__title">${wo.title}</div>` : '';
          return `
            <article class="wo-card ${cardStatusClass(wo.status)}" aria-label="${wo.woNumber}">
              <div class="wo-card__id">${wo.woNumber}</div>
              ${safeTitle}
              <div class="wo-card__meta">${formatDueMeta(wo)}</div>
            </article>
          `;
        }).join('');
      }

      function PPMAssetRow(row, weekKeys){
        const weekCells = weekKeys.map((weekKey) => `<div class="planner-cell week-cell" role="gridcell">${renderWeekCards(row.weeks[weekKey] || [])}</div>`).join('');
        return `
          <div class="planner-row" role="row">
            <div class="planner-cell asset-cell" role="rowheader" title="${row.assetName}">${row.assetName}</div>
            ${weekCells}
          </div>
        `;
      }

      function updatePlannerGridColumns(weekKeys){
        const template = ['260px', ...weekKeys.map(() => 'minmax(120px,1fr)')].join(' ');
        const minWidth = 260 + (weekKeys.length * 120);
        document.documentElement.style.setProperty('--planner-columns', template);
        document.documentElement.style.setProperty('--planner-min-width', `${minWidth}px`);
      }

      function renderSiteFilter(siteKeys){
        const keys = ['all', ...(siteKeys || [])];
        const labels = window.PPMWeeklyAssetTransform.SITE_KEY_LABELS;
        siteFilterTabs.innerHTML = keys.map(siteKey => {
          const text = labels[siteKey] || siteKey;
          const pressed = selectedSiteKey === siteKey ? 'true' : 'false';
          return `<button type="button" class="site-filter__tab" data-site-key="${siteKey}" aria-pressed="${pressed}">${text}</button>`;
        }).join('');

        siteFilterTabs.querySelectorAll('.site-filter__tab').forEach((button) => {
          button.addEventListener('click', () => {
            selectedSiteKey = button.dataset.siteKey || 'all';
            siteFilterTabs.querySelectorAll('.site-filter__tab')
              .forEach((tab) => tab.setAttribute('aria-pressed', tab === button ? 'true' : 'false'));
            if(siteLabel) siteLabel.textContent = labels[selectedSiteKey] || selectedSiteKey;
            renderPlanner();
          });
        });

        if(siteLabel){
          siteLabel.textContent = labels[selectedSiteKey] || selectedSiteKey;
        }
      }

      function renderError(message){
        plannerSurface.innerHTML = `${PPMPlannerHeader(weekKeyOrder)}<p class="empty-state">${message}</p>`;
        document.querySelector('[data-kpi="total-work-orders"]').textContent = '0';
        document.querySelector('[data-kpi="total-assets"]').textContent = '0';
        document.querySelector('[data-kpi="scheduled-weeks"]').textContent = '0';
      }

      function renderPlanner(){
        if(plannerError){
          renderError(plannerError);
          return;
        }

        if(!plannerData){
          renderError('Loading MaintainX work orders…');
          return;
        }

        weekKeyOrder = listYearWeekKeys(selectedYear);
        updatePlannerGridColumns(weekKeyOrder);

        const siteFiltered = plannerData.activePPM.filter(order => {
          if(selectedSiteKey === 'all') return true;
          return order.siteKey === selectedSiteKey;
        });

        const yearFiltered = siteFiltered.filter(order => {
          const d = order.dueDate || new Date(order.dueDateRaw);
          return d instanceof Date && !Number.isNaN(d.getTime()) && d.getFullYear() === selectedYear;
        });

        const byAsset = new Map();
        yearFiltered.forEach((order) => {
          const key = order.assetName;
          if(!key) return;
          if(!byAsset.has(key)){
            const baseWeeks = Object.fromEntries(weekKeyOrder.map((k) => [k, []]));
            byAsset.set(key, { assetName: key, weeks: baseWeeks });
          }
          const wk = isoWeekKey(order.dueDate || new Date(order.dueDateRaw));
          if(byAsset.get(key).weeks[wk]){
            byAsset.get(key).weeks[wk].push(order);
          }
        });

        const rows = [...byAsset.values()].sort((a, b) => a.assetName.localeCompare(b.assetName, undefined, { sensitivity:'base' }));
        const scheduledWeeks = new Set();
        let totalWorkOrders = 0;
        rows.forEach((row) => {
          weekKeyOrder.forEach((wk) => {
            const count = row.weeks[wk].length;
            if(count > 0) scheduledWeeks.add(wk);
            totalWorkOrders += count;
          });
        });

        document.querySelector('[data-kpi="total-work-orders"]').textContent = String(totalWorkOrders);
        document.querySelector('[data-kpi="total-assets"]').textContent = String(rows.length);
        document.querySelector('[data-kpi="scheduled-weeks"]').textContent = String(scheduledWeeks.size);

        const rowsMarkup = rows.map((row) => PPMAssetRow(row, weekKeyOrder)).join('');
        const selectedWeekLabel = plannerData.selectedWeek?.label || plannerData.selectedWeek?.weekEnd || 'latest published week';
        const emptyMarkup = rows.length === 0
          ? `<p class="empty-state">No active PPM work orders found for the selected site in ${selectedYear} (source: ${selectedWeekLabel}).</p>`
          : '';

        plannerSurface.innerHTML = `${PPMPlannerHeader(weekKeyOrder)}${rowsMarkup}${emptyMarkup}`;
        renderMonthJump();
      }

      function renderYearSelect(){
        const nowYear = new Date().getFullYear();
        const years = Array.from({ length: 7 }, (_, i) => nowYear - 3 + i);
        if(!years.includes(selectedYear)) years.push(selectedYear);
        years.sort((a, b) => a - b);
        yearSelect.innerHTML = years.map((year) => `<option value="${year}" ${year === selectedYear ? 'selected' : ''}>${year}</option>`).join('');
        yearSelect.addEventListener('change', () => {
          selectedYear = Number(yearSelect.value) || nowYear;
          renderPlanner();
          renderMonthJump();
        });
      }

      function renderMonthJump(){
        const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        const monthMap = buildMonthMap(weekKeyOrder);
        monthJump.innerHTML = monthNames.map((name, monthIndex) => {
          const targetWeek = monthMap.get(monthIndex);
          if(!targetWeek) return `<button type="button" class="month-jump__btn" disabled>${name}</button>`;
          return `<button type="button" class="month-jump__btn" data-week-key="${targetWeek}">${name}</button>`;
        }).join('');

        monthJump.querySelectorAll('[data-week-key]').forEach((button) => {
          button.addEventListener('click', () => {
            const index = weekKeyOrder.indexOf(button.dataset.weekKey);
            if(index < 0) return;
            const planner = document.querySelector('.planner');
            planner.scrollTo({ left: 260 + (index * 120), behavior: 'smooth' });
          });
        });
      }

      async function loadPlannerData(){
        try {
          const source = await window.PPMWeeklyAssetTransform.loadMaintainXRawData();
          const normalized = window.PPMWeeklyAssetTransform.getNormalizedWorkOrders(source.rawRows);
          const activePPM = window.PPMWeeklyAssetTransform.getActivePPMWorkOrders(normalized);

          plannerData = {
            selectedWeek: source.selectedWeek,
            activePPM
          };

          const initialGroup = window.PPMWeeklyAssetTransform.groupPPMWorkOrdersByAssetAndWeek(
            activePPM,
            'all',
            startOfWeek(new Date())
          );

          renderSiteFilter(initialGroup.sites);
          renderPlanner();
        } catch (err){
          console.error('[PPM Weekly Asset] Failed to load shared MaintainX source', err);
          plannerError = `MaintainX source unavailable. ${err?.message || 'Could not load shared work order data.'}`;
          renderSiteFilter([]);
          renderPlanner();
        }
      }

      function applyTheme(theme){
        const isDark = theme === 'dark';
        root.classList.toggle('dark', isDark);
        root.classList.toggle('light', !isDark);
        themeBtn?.setAttribute('aria-checked', isDark ? 'true' : 'false');
        themeBtn.textContent = isDark ? 'Theme: Dark' : 'Theme: Light';
      }

      function updateStickyOffset(){
        const sticky = document.querySelector('[data-component="sticky-controls"]');
        const rect = sticky?.getBoundingClientRect();
        document.documentElement.style.setProperty('--sticky-controls-offset', `${Math.ceil(rect ? rect.height : 0)}px`);
      }

      const THEME_KEY = 'theme';
      const stored = localStorage.getItem(THEME_KEY) || 'light';
      applyTheme(stored);
      themeBtn?.addEventListener('click', () => {
        const next = root.classList.contains('dark') ? 'light' : 'dark';
        localStorage.setItem(THEME_KEY, next);
        applyTheme(next);
      });

      renderSiteFilter([]);
      renderYearSelect();
      renderPlanner();
      loadPlannerData();
      updateStickyOffset();
      window.addEventListener('resize', updateStickyOffset, { passive:true });
    })();
  </script>
</body>
</html>
